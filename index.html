<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expedição - Romaneio Profissional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="no-print">
        <h1>Sistema de Expedição</h1>
        <p>Carregue o XML. A transportadora e os itens editáveis estão otimizados para leitura rápida.</p>
    </header>

    <main class="no-print">
        <div class="upload-container">
            <input type="file" id="xmlInput" accept=".xml">
            <label for="xmlInput" style="cursor: pointer; font-weight: bold;">[ Escolher XML da Nota ]</label>
        </div>

        <div class="config-container">
            <label for="responsavelSelect"><strong>Selecionar Responsável:</strong></label>
            <select id="responsavelSelect">
                <option value="">-- Selecione o Responsável --</option>
                <option value=" / PF-CAROLINE">1: / PF-CAROLINE</option>
                <option value=" / PF-SARA">2: / PF-SARA</option>
                <option value=" / PF-NICOLY">3: / PF-NICOLY</option>
                <option value=" / MERCADO LIVRE">4: / MERCADO LIVRE</option>
            </select>
        </div>
        <button id="addItemBtn" class="btn-secundario no-print">+ Adicionar Novo Item</button>
    </main>

    <div id="printArea">
        <div class="conteudo-flexivel">
            <div class="header-nota">
                <div class="titulo-container">
                    <span class="tag-topo">NOTA FISCAL</span>
                    <div id="outNF" class="nf-gigante">---</div>
                </div>
                <div class="dados-data">
                    <strong>DATA:</strong> <span id="outData">---</span>
                </div>
            </div>

            <section class="dados-secao">
                <div class="tag-secao">DESTINATÁRIO</div>
                <p class="texto-destaque">
                    <span id="outDestinatario">---</span><span id="outResponsavel" style="color: #d32f2f;"></span>
                </p>
            </section>

            <section class="dados-secao">
                <div class="tag-secao">LOGÍSTICA</div>
                <div class="grid-logistica">
                    <div class="transp-info">
                        <strong>TRANSP:</strong> 
                        <span id="outTransportadora" class="transp-destaque">---</span>
                    </div>
                    <div class="vol-container">
                        <strong>VOLUMES:</strong> 
                        <input type="text" id="outVolumes" class="vol-gigante" value="1">
                    </div>
                </div>
            </section>

            <section class="dados-secao tabela-container">
                <div class="tag-secao">ITENS PARA CONFERÊNCIA</div>
                <table id="tabelaItens">
                    <thead>
                        <tr>
                            <th style="width: 10%;">QTD</th>
                            <th style="width: 75%;">DESCRIÇÃO DO PRODUTO</th>
                            <th style="width: 10%;">CONF.</th>
                            <th class="no-print" style="width: 5%;"></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </div>
    </div>

    <button onclick="window.print()" class="btn-print no-print">Imprimir Romaneio</button>

    <script src="script.js"></script>
</body>
</html>
